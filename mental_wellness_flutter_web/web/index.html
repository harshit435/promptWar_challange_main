<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Mental Wellness Tracker">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Wellness Tracker</title>
  </head>
  <body>
    <!-- Accessible SEO and Screen Reader Fallback Landmark Tree -->
    <main aria-label="ZenPrep Mental Wellness Tracker">
      <header>
        <h1>ZenPrep Sanctuary</h1>
        <p>A mental wellness tracker for competitive exam aspirants (JEE, NEET, UPSC, Boards).</p>
      </header>
      
      <section aria-label="Aspirant Sign In">
        <h2>Aspirant Sign In</h2>
        <form action="#" method="POST">
          <label for="email-field">Aspirant Email Address</label>
          <input type="email" id="email-field" name="email" required placeholder="aspirant@example.com" />
          
          <br/>
          <label for="password-field">Password</label>
          <input type="password" id="password-field" name="password" required />
          
          <br/>
          <button type="submit">Enter Sanctuary App</button>
        </form>
      </section>

      <nav aria-label="Sanctuary Navigation Map">
        <h2>Sanctuary Navigation Map</h2>
        <ul>
          <li><a href="#/main">Skip to Dashboard</a></li>
          <li><a href="#/breath">Box Breathing Guide</a></li>
          <li><a href="#/shredder">Stress Worry Shredder</a></li>
          <li><a href="#/chatbot">ZenBot Companion</a></li>
        </ul>
      </nav>
    </main>

    <script src="main.dart.js"></script>
  </body>
</html>
